<!doctype html>
<html lang="zh-Hant">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="馥華營運管理系統傳統 HTML 登入頁。">
  <title>後台登入 | 馥華營運管理系統</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <section class="auth-shell">
    <aside class="brand-panel" aria-label="品牌資訊">
      <div class="brand-panel__art" aria-hidden="true">
        <div class="brand-panel__glow"></div>
        <img class="brand-panel__image" src="../public/login.png" alt="" width="800" height="800">
      </div>

      <div class="brand-panel__content">
        <img class="brand-panel__logo" src="../public/logo.svg" alt="品牌識別" width="1938" height="321">
        <p class="brand-panel__eyebrow">Administration Portal</p>
        <h1 class="brand-panel__title">馥華營運管理系統</h1>
        <h2 class="brand-panel__subtitle">
          系統資料屬馥華全球電商機密文件
        </h2>
        <p class="brand-panel__description">
          未經授權，禁止複製、轉錄或攝影等其他洩密行為。
        </p>
        <a class="brand-panel__policy" href="#">
          查看保密與隱私條款
        </a>
      </div>
    </aside>

    <main id="main-content" class="login-area">
      <div class="login-column">
        <section class="login-card" aria-labelledby="login-title">
          <header class="login-card__header">
            <p class="login-card__overline">Welcome back</p>
            <h2 id="login-title" class="login-card__title">登入管理後台</h2>
            <p class="login-card__description">
              請使用您的內部帳號與密碼登入。若超過 8 秒未完成驗證，
              系統會提示您重新嘗試。
            </p>
          </header>

          <form class="login-form" method="post" action="">
            <div class="form-field">
              <label class="form-field__label" for="account">帳號</label>
              <input id="account" class="form-field__input" type="email" name="account" autocomplete="username"
                inputmode="email" placeholder="admin@example.com" required>
            </div>

            <div class="form-field">
              <label class="form-field__label" for="password">密碼</label>
              <input id="password" class="form-field__input" type="password" name="password"
                autocomplete="current-password" placeholder="Admin123!" minlength="6" required>
            </div>

            <div class="login-form__actions">
              <a class="login-form__link" href="#">忘記密碼？</a>
            </div>

            <button class="login-form__submit" type="submit">
              登入後台
            </button>

            <p class="login-form__footer">
              登入即代表您同意遵循內部資料安全與操作規範。
            </p>

          </form>

          <footer class="login-card__meta">
            <p>需要重設密碼或開通權限，請聯絡系統管理員。</p>
          </footer>
        </section>

        <p class="login-column__copyright">
          Copyright © Forwardmall. All rights reserved.
        </p>
      </div>
    </main>
  </section>
</body>

</html>
